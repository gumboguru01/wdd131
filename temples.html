<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album</title>
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script defer src="scripts/temples.js"></script>
</head>

<body>

    <header>
        <h1>Temple Album</h1>
        <button id="menu-btn">☰</button>
        <nav id="nav-menu">
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>
        </nav>
    </header>

    <main>
        <h2>Beautiful Temples</h2>
        <section class="gallery">
            <figure>
                <img src="images/temple1.jpg" alt="Temple 1">
                <figcaption>Temple 1</figcaption>
            </figure>
            <figure>
                <img src="images/temple2.jpg" alt="Temple 2">
                <figcaption>Temple 2</figcaption>
            </figure>
            <!-- Repeat for 9 images -->
        </section>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> | Last updated: <span id="last-modified"></span></p>
    </footer>

</body>

</html>
