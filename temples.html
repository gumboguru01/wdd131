<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album</title>
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script defer src="scripts/temples.js"></script>
</head>

<body>

    <header>
        <h1>Temple Album</h1>
        <button id="menu-btn">☰</button>
        <nav id="nav-menu">
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>
        </nav>
    </header>

    <main>
        <h2>Beautiful Temples</h2>
        <section class="gallery">
            <figure>
                <img src="images/temple1.webp" alt="Temple 1">
                <figcaption>Salt Lake City, Utah</figcaption>
            </figure>
            <figure>
                <img src="images/temple2.webp" alt="Temple 2">
                <figcaption>Tokyo, Japan</figcaption>
            </figure>
            <figure>
                <img src="images/temple3.webp" alt="Temple 3">
                <figcaption>Rome, Italy </figcaption>
            </figure>
            <figure>
                <img src="images/temple4.webp" alt="Temple 4">
                <figcaption>Auckland, New Zealand</figcaption>
            </figure>
            <figure>
                <img src="images/temple5.webp" alt="Temple 5">
                <figcaption>Zurich, Switzerland</figcaption>
            </figure>
            <figure>
                <img src="images/temple6.webp" alt="Temple 6">
                <figcaption>Quebec, Canada</figcaption>
            </figure>
            <figure>
                <img src="images/temple7.webp" alt="Temple 7">
                <figcaption>Seoul, South Korea </figcaption>
            </figure>
            <figure>
                <img src="images/temple8.webp" alt="Temple 8">
                <figcaption>Cairo, Egypt</figcaption>
            </figure>
            <figure>
                <img src="images/temple9.webp" alt="Temple 9">
                <figcaption>Berlin, Germany</figcaption>
            </figure>

        </section>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> | Last updated: <span id="last-modified"></span></p>
    </footer>

</body>

</html>
